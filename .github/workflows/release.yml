name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  release:
    name: Prepare release asset
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set package version
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" "${{ github.workspace }}/custom_components/energy_hub_poland/manifest.json"

      - name: Create zipped release package
        shell: bash
        run: |
          cd "${{ github.workspace }}/custom_components"
          zip -r ../energy_hub_poland.zip energy_hub_poland/

      - name: Upload zip to release
        uses: softprops/action-gh-release@v2
        with:
          files: energy_hub_poland.zip